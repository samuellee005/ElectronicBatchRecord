# Apache vhost for the EBR Docker container on arcturus.
# Drop this at /etc/apache2/sites-available/ebr-arcturus.conf and enable with:
#   sudo a2enmod proxy proxy_http ssl headers
#   sudo a2ensite ebr-arcturus
#   sudo systemctl reload apache2
#
# Requires Apache to Listen on 5173 — add this to /etc/apache2/ports.conf:
#   Listen 5173
#
# Adjust SSLCertificateFile / SSLCertificateKeyFile paths to match the certs
# already in use for arcturus.discoverybase.net.

<VirtualHost *:5173>
    ServerName arcturus.discoverybase.net

    SSLEngine on
    SSLCertificateFile      /etc/ssl/certs/arcturus.discoverybase.net.crt
    SSLCertificateKeyFile   /etc/ssl/private/arcturus.discoverybase.net.key
    # If using a chain file:
    # SSLCertificateChainFile /etc/ssl/certs/arcturus.discoverybase.net.chain.crt

    ProxyPreserveHost On
    ProxyRequests Off

    # Forward everything to the container published on 127.0.0.1:8080
    ProxyPass        /  http://127.0.0.1:8080/
    ProxyPassReverse /  http://127.0.0.1:8080/

    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port  "5173"

    ErrorLog  ${APACHE_LOG_DIR}/ebr-arcturus-error.log
    CustomLog ${APACHE_LOG_DIR}/ebr-arcturus-access.log combined
</VirtualHost>
