# Postgres credentials live in .env (EBR_PG_HOST/USER/PASSWORD).
# Dev default: EBR_LOGIN_BYPASS_DB=1 lets any username sign in.
services:
  ebr:
    build:
      context: .
      dockerfile: Dockerfile
    image: ebr-app:latest
    container_name: ebr-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      EBR_LOGIN_BYPASS_DB: "1"
      # Inter-container DNS — reaches pdf-detect over the compose network.
      EBR_PDF_DETECT_URL: "http://pdf-detect:8000"
    depends_on:
      - pdf-detect
    ports:
      - "127.0.0.1:8080:8080"

  pdf-detect:
    build:
      context: ./pdf_field_service
      dockerfile: Dockerfile
    image: ebr-pdf-detect:latest
    container_name: ebr-pdf-detect
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
